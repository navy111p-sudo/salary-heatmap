<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MANGOI | Salary Treemap</title>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Noto Sans KR", "sans-serif"] },
            colors: {
              primary: {
                50: "#f0f7ff",
                500: "#0c8ee6",
                600: "#0070c4",
                900: "#0b406d",
              },
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="css/style.css" />
  
<style>
  .header__nav-link,.header__nav a,.header__nav-link--active,header nav a,header nav ul li a{color:#FF8C00!important}
  .header__nav-link:hover,header nav a:hover{color:#FFA500!important}
  .header__logo a,.header__logo{color:#FF8C00!important}
  .header__logo a span{color:#FFB347!important}
</style>

<style>
  .header__nav-link,.header__nav a,.header__nav-link--active,header nav a,header nav ul li a{color:#FF8C00!important}
  .header__nav-link:hover,header nav a:hover{color:#FFA500!important}
  .header__logo a,.header__logo{color:#FF8C00!important}
  .header__logo a span{color:#FFB347!important}
</style>
</head>
  <body class="bg-gray-50 font-sans text-gray-800">
    <header class="header relative z-50">
      <div
        class="header__container max-w-6xl mx-auto px-4 py-4 flex justify-between items-center"
      >
        <div
          class="header__logo font-bold text-2xl text-primary-600 tracking-tight"
        >
          <a href="index.html"
            >MANGOI
            <span class="text-sm font-normal text-gray-500">Dashboard</span></a
          >
        </div>
        <nav class="header__nav">
          <ul class="flex space-x-6 text-sm font-medium text-gray-600">
            <li>
              <a
                href="index.html"
                class="header__nav-link hover:text-primary-500 transition-colors"
                >Home</a
              >
            </li>
            <li>
              <a
                href="heatmap.html"
                class="header__nav-link hover:text-primary-500 transition-colors"
                >Heatmap</a
              >
            </li>
            <li>
              <a
                href="treemap.html"
                class="header__nav-link header__nav-link--active text-primary-600"
                >Treemap</a
              >
            </li>
            <li>
              <a
                href="calculator.html"
                class="header__nav-link hover:text-primary-500 transition-colors"
                >Salary Calculator</a
              >
            </li>
            <li>
              <a
                href="report.html"
                class="header__nav-link hover:text-primary-500 transition-colors"
                >Evaluation Report</a
              >
            </li>
          </ul>
        </nav>

        <div class="relative ml-4 header__lang" id="langDropdownContainer">
          <button id="langSelectBtn" class="flex items-center text-gray-500 hover:text-primary-600 transition-colors focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21.121 12A9.135 9.135 0 0121 12c-0.612 0-1.196-0.126-1.724-0.348C18.423 11.233 18 10.669 18 10c0-.853-0.536-1.579-1.298-1.854C16.321 8.01 16 7.533 16 7v-1c0-.552-.448-1-1-1H9.5a1 1 0 01-1-1V3.935A9.09 9.09 0 003.055 11" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 22a10 10 0 110-20 10 10 0 010 20z" />
            </svg>
            <span id="currentLangLabel">KOR</span>
          </button>
          <div id="langDropdownMenu" class="absolute right-0 mt-2 w-32 bg-white rounded-md shadow-lg hidden z-50 border border-gray-100">
            <ul class="py-1 text-sm text-gray-700">
              <li><button class="block w-full text-left px-4 py-2 hover:bg-gray-100 lang-option" data-lang="ko">한국어 (KOR)</button></li>
              <li><button class="block w-full text-left px-4 py-2 hover:bg-gray-100 lang-option" data-lang="en">English (ENG)</button></li>
              <li><button class="block w-full text-left px-4 py-2 hover:bg-gray-100 lang-option" data-lang="tl">Filipino (TAG)</button></li>
            </ul>
          </div>
        </div>

      </div>
    </header>

    <main
      class="max-w-6xl mx-auto px-4 py-8 h-[calc(100vh-140px)] flex flex-col"
    >
      <div class="mb-4 flex justify-between items-end flex-wrap gap-4">
        <div>
          <h1 class="text-2xl font-bold text-gray-900 mb-1">
            Salary Treemap
          </h1>
          <p class="text-sm text-gray-500">Size = Salary, Color = Evaluation Grade</p>
        </div>

        <!-- Control Menu -->
        <div
          class="flex items-center gap-4 text-sm bg-white p-2 rounded-lg border border-gray-200"
        >
          <div class="flex items-center gap-2">
            <label for="sort-dropdown" class="text-gray-700 font-medium"
              >Sort by:</label
            >
            <select
              id="sort-dropdown"
              class="bg-gray-50 border border-gray-300 rounded px-2 py-1 outline-none focus:border-primary-500"
            >
              <option value="salary-desc">Salary (Highest)</option>
              <option value="salary-asc">Salary (Lowest)</option>
            </select>
          </div>
          <div class="flex items-center gap-2">
            <label for="group-dropdown" class="text-gray-700 font-medium"
              >Group:</label
            >
            <select
              id="group-dropdown"
              class="bg-gray-50 border border-gray-300 rounded px-2 py-1 outline-none focus:border-primary-500"
            >
              <option value="location">Work Type (Office/Home)</option>
              <option value="none">No Grouping</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Legend -->
      <div
        class="flex flex-wrap gap-4 text-xs font-bold justify-end mb-4"
        id="legend-container"
      >
        <!-- Populated by JS -->
      </div>

      <!-- Treemap Container -->
      <div
        class="flex-grow bg-white rounded-xl shadow-sm border border-gray-200 p-2 overflow-hidden relative"
        id="treemap-container"
      >
        <!-- Rendered by JS -->
      </div>

      <!-- Summary Bar -->
      <div
        class="mt-4 text-sm text-gray-500 text-right bg-white p-3 rounded-lg border border-gray-200"
        id="summary-bar"
      >
        Total Teachers: <span id="total-count">0</span> | Total Salary:
        <span id="total-salary">0</span> KRW | Average:
        <span id="avg-salary">0</span> KRW
      </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/treemap.js"></script>
      <script src="js/i18n.js"></script>
  </body>
</html>
